services:
  postgres:
    image: postgres:16-alpine
    container_name: concurrency-lab-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: concurrency_lab
      POSTGRES_USER: concurrency_lab
      POSTGRES_PASSWORD: concurrency_lab
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U concurrency_lab -d concurrency_lab"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
